name: Pipefy → Slack Notifier

on:
  schedule:
    - cron: "0 */6 * * *"   # roda a cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar notificador
        env:
          PIPEFY_TOKEN:  ${{ secrets.PIPEFY_TOKEN }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python pipefy_slack_notifier.py

      - name: Salvar notified_cards.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notified_cards.json
          git diff --cached --quiet || git commit -m "chore: atualiza cards notificados"
          git push
